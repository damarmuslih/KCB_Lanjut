<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Identifikasi Hewan — Field Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #14231c;
    --bg-panel: #1b2f25;
    --paper: #f2ead9;
    --ink: #eae2cf;
    --ink-dim: #9db3a2;
    --ochre: #d8a13a;
    --ochre-dim: #8c6f36;
    --line: #2c4536;
    --error: #c96a4f;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 56px 24px 80px;
  }

  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 1px solid var(--line);
    padding-bottom: 20px;
    margin-bottom: 40px;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ochre);
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 34px;
    letter-spacing: -0.01em;
    margin: 6px 0 0;
    color: var(--paper);
  }

  .spec-no {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-dim);
    text-align: right;
  }

  .dropzone {
    border: 1px dashed var(--ink-dim);
    border-radius: 2px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s ease, background 0.2s ease;
    background: var(--bg-panel);
  }

  .dropzone:hover, .dropzone.drag {
    border-color: var(--ochre);
    background: #1f3527;
  }

  .dropzone p {
    margin: 0;
    color: var(--ink-dim);
    font-size: 14px;
  }

  .dropzone .dz-title {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    color: var(--paper);
    margin-bottom: 8px;
  }

  #fileInput { display: none; }

  .card {
    margin-top: 32px;
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 2px;
    overflow: hidden;
    display: none;
  }

  .card.show { display: grid; grid-template-columns: 200px 1fr; }

  @media (max-width: 560px) {
    .card.show { grid-template-columns: 1fr; }
  }

  .specimen-img {
    background: #0d1712;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .specimen-img img {
    max-width: 100%;
    max-height: 220px;
    border-radius: 2px;
    display: block;
  }

  .specimen-info {
    padding: 24px;
    border-left: 1px solid var(--line);
  }

  @media (max-width: 560px) {
    .specimen-info { border-left: none; border-top: 1px solid var(--line); }
  }

  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }

  .result-name {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    color: var(--paper);
    margin: 4px 0 20px;
  }

  .bars { display: flex; flex-direction: column; gap: 10px; }

  .bar-row {
    display: grid;
    grid-template-columns: 90px 1fr 48px;
    align-items: center;
    gap: 10px;
    font-size: 13px;
  }

  .bar-track {
    height: 6px;
    background: #0d1712;
    border-radius: 3px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: var(--ochre);
    width: 0%;
    transition: width 0.6s ease;
  }

  .bar-row:not(:first-child) .bar-fill { background: var(--ochre-dim); }

  .bar-pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-dim);
    text-align: right;
  }

  .status {
    margin-top: 20px;
    font-size: 13px;
    color: var(--ink-dim);
    font-family: 'JetBrains Mono', monospace;
    min-height: 18px;
  }

  .status.error { color: var(--error); }

  .reset-btn {
    margin-top: 24px;
    background: none;
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 8px 16px;
    border-radius: 2px;
    cursor: pointer;
    display: none;
  }

  .reset-btn.show { display: inline-block; }
  .reset-btn:hover { border-color: var(--ochre); color: var(--ochre); }

  footer {
    margin-top: 48px;
    font-size: 12px;
    color: var(--ink-dim);
    border-top: 1px solid var(--line);
    padding-top: 16px;
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div>
      <div class="eyebrow">Field Guide — Klasifikasi Otomatis</div>
      <h1>Identifikasi Hewan</h1>
    </div>
    <div class="spec-no">SPESIMEN<br>10 KATEGORI</div>
  </header>

  <div class="dropzone" id="dropzone">
    <div class="dz-title">Unggah foto hewan</div>
    <p>Klik untuk pilih file, atau seret gambar ke sini (JPG/PNG)</p>
  </div>
  <input type="file" id="fileInput" accept="image/*">

  <div class="card" id="resultCard">
    <div class="specimen-img">
      <img id="previewImg" src="" alt="Preview">
    </div>
    <div class="specimen-info">
      <div class="tag" id="latinTag">—</div>
      <div class="result-name" id="resultName">—</div>
      <div class="bars" id="bars"></div>
    </div>
  </div>

  <div class="status" id="statusText"></div>
  <button class="reset-btn" id="resetBtn">Coba gambar lain</button>

  <footer>
    Backend: Flask + DenseNet121 (transfer learning) · Dataset Animals-10
  </footer>
</div>

<script>
  // ============================================
  // UBAH INI kalau backend di-deploy ke alamat lain
  const API_URL = 'http://localhost:5000/predict';
  // ============================================

  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const resultCard = document.getElementById('resultCard');
  const previewImg = document.getElementById('previewImg');
  const resultName = document.getElementById('resultName');
  const latinTag = document.getElementById('latinTag');
  const bars = document.getElementById('bars');
  const statusText = document.getElementById('statusText');
  const resetBtn = document.getElementById('resetBtn');

  dropzone.addEventListener('click', () => fileInput.click());

  dropzone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropzone.classList.add('drag');
  });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
  dropzone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropzone.classList.remove('drag');
    if (e.dataTransfer.files.length) {
      handleFile(e.dataTransfer.files[0]);
    }
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) handleFile(fileInput.files[0]);
  });

  resetBtn.addEventListener('click', () => {
    resultCard.classList.remove('show');
    statusText.textContent = '';
    statusText.classList.remove('error');
    resetBtn.classList.remove('show');
    fileInput.value = '';
  });

  async function handleFile(file) {
    if (!file.type.startsWith('image/')) {
      showError('File yang dipilih bukan gambar.');
      return;
    }

    previewImg.src = URL.createObjectURL(file);
    resultCard.classList.add('show');
    resetBtn.classList.add('show');
    resultName.textContent = 'Menganalisis…';
    latinTag.textContent = 'Memproses gambar';
    bars.innerHTML = '';
    statusText.textContent = 'Mengirim gambar ke model…';
    statusText.classList.remove('error');

    const formData = new FormData();
    formData.append('image', file);

    try {
      const res = await fetch(API_URL, { method: 'POST', body: formData });
      const data = await res.json();

      if (!data.success) {
        showError(data.error || 'Prediksi gagal.');
        return;
      }

      resultName.textContent = data.prediction.label_id;
      latinTag.textContent = data.prediction.label_it;
      statusText.textContent = `Selesai · keyakinan tertinggi ${data.prediction.confidence}%`;

      bars.innerHTML = '';
      data.top3.forEach((item) => {
        const row = document.createElement('div');
        row.className = 'bar-row';
        row.innerHTML = `
          <span>${item.label_id}</span>
          <span class="bar-track"><span class="bar-fill" style="width:${item.confidence}%"></span></span>
          <span class="bar-pct">${item.confidence}%</span>
        `;
        bars.appendChild(row);
      });

    } catch (err) {
      showError('Tidak bisa terhubung ke backend. Pastikan server Flask (app.py) sedang berjalan di ' + API_URL);
    }
  }

  function showError(msg) {
    resultName.textContent = 'Gagal';
    latinTag.textContent = '—';
    bars.innerHTML = '';
    statusText.textContent = msg;
    statusText.classList.add('error');
  }
</script>

</body>
</html>
